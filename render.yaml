# Render Blueprint for the Pharos Multi-Agent Job Router
#
# This file lets Render spin up both the API (Web Service) and the
# dashboard (Web Service) from a single click.
#
# How to use:
#   1. Push this repo to GitHub (already done).
#   2. Sign in to https://render.com with GitHub.
#   3. New + → Blueprint → connect the repo → Apply.
#   4. Render reads this file, creates both services, builds, and
#      gives you two URLs:
#         - https://pharos-router-api.onrender.com
#         - https://pharos-router-web.onrender.com
#   5. Open the web URL with ?authToken=<the token from step 6> to
#      seed the demo job.
#
# Variables generated at apply time:
#   - PHAROS_ROUTER_AUTH_TOKEN is a 32-byte hex secret stored in the
#     Render dashboard; it is the only thing the web needs to know to
#     call the API. There is no "forgot password" — if you lose it,
#     reset it in the dashboard and push a no-op commit to retrigger
#     the build.
#
# CORS:
#   CORS_ORIGINS is pinned to the web service's public URL. If you
#   rename the web service, update this value.
#
# Persistence:
#   This Blueprint is free-tier-only. Render's free Web Services do
#   not support persistent disks, so the in-memory JobStore starts
#   empty on every cold start. We work around that with
#   PHAROS_ROUTER_AUTO_SEED=1 — the API re-seeds the demo job on
#   boot if the store is empty, so the demo URL is consistent across
#   every wake/sleep cycle. For real persistence, upgrade to a paid
#   plan and add a `disk:` block to the API service below.

services:
  # ---------- API ----------
  - type: web
    name: pharos-router-api
    runtime: node
    nodeVersion: 20.18.0
    plan: free
    region: oregon
    branch: main
    # `--include=dev` is critical: Render's `NODE_ENV=production` env
    # var (set below) propagates into the build step and causes `npm
    # ci` to skip devDependencies. We need them at build time
    # (typescript, vitest, vite, etc.) so the override is mandatory.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PHAROS_ROUTER_DEMO
        value: "1"
      - key: PHAROS_ROUTER_AUTO_SEED
        value: "1"
      - key: PHAROS_ROUTER_AUTH_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        value: https://pharos-router-web.onrender.com
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: PHAROS_CHAIN_ID
        value: "688689"

  # ---------- Web ----------
  # Note: Render Blueprints do not support static sites via YAML; the
  # `static` type is rejected with "unknown type". We deploy the
  # dashboard as a regular Node Web Service that serves the Vite
  # build output from `apps/web/dist/` (see `apps/web/serve.mjs`).
  # The runtime is identical to a Render Static Site for this
  # workload (read-only, no backend).
  #
  # VITE_API_BASE: Render's `fromService` only exposes a few
  # properties (host, hostport, port, connectionString) — not the
  # full `https://host` URL. So we hardcode the API's public URL
  # here. The service name `pharos-router-api` is fixed in this
  # file, so Render assigns exactly this URL.
  - type: web
    name: pharos-router-web
    runtime: node
    nodeVersion: 20.18.0
    plan: free
    region: oregon
    branch: main
    # `--include=dev` is critical: Render's `NODE_ENV=production` env
    # var propagates into the build step and causes `npm ci` to skip
    # devDependencies. Vite is in apps/web's devDependencies and must
    # be installed for the final `npx vite build` step.
    buildCommand: |
      npm ci --include=dev &&
      npm run build &&
      cd apps/web &&
      npx vite build
    startCommand: node apps/web/serve.mjs
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        value: https://pharos-router-api.onrender.com
      - key: NODE_ENV
        value: production
